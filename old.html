<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>小红书情感图文批量生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333;padding:12px}
.h{max-width:1200px;margin:0 auto 16px;padding:20px 24px;background:linear-gradient(135deg,#FF6B9D,#C44A8B 50%,#8B2F6E);border-radius:14px;color:#fff;position:relative;overflow:hidden}
.h::before{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;background:rgba(255,255,255,.06);border-radius:50%}
.h h1{font-size:22px;font-weight:700}.h p{margin-top:4px;opacity:.8;font-size:12px}
.l{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:240px 1fr;gap:16px}
.p{background:#fff;border-radius:12px;padding:14px}
.p h2{font-size:14px;font-weight:600;margin-bottom:10px;color:#444}
.f{margin-bottom:10px}.f label{display:block;font-size:11px;font-weight:500;margin-bottom:3px;color:#888}
.f input,.f textarea{width:100%;padding:6px 10px;border:1px solid #e8e8e8;border-radius:8px;font-size:12px;font-family:inherit;background:#fafafa}
.f input:focus,.f textarea:focus{outline:none;border-color:#FF6B9D;background:#fff}
.f textarea{resize:vertical;min-height:38px}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:10px}
.to{border:2px solid #eee;border-radius:8px;padding:6px 2px;text-align:center;cursor:pointer;font-size:10px;color:#999;background:#fafafa}
.to.s,.to:hover{border-color:#FF6B9D;background:#fff0f5;color:#C44A8B}
.to .i{font-size:14px;display:block}
.bgg{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px;max-height:150px;overflow-y:auto}
.bgo{border:2px solid #eee;border-radius:6px;padding:4px 2px;text-align:center;cursor:pointer;font-size:9px;color:#999;height:40px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.bgo.s,.bgo:hover{border-color:#FF6B9D}
.bgo .bgp{width:100%;height:14px;border-radius:4px;margin-bottom:2px}
.cl{max-height:280px;overflow-y:auto;margin-bottom:10px}
.ci{padding:5px 8px;border:1px solid #f0f0f0;border-radius:6px;margin-bottom:3px;cursor:pointer}
.ci:hover{background:#fff0f5;border-color:#FF6B9D}
.ci .cm{font-size:12px;font-weight:500;color:#444}.ci .cs{font-size:10px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.b{display:inline-block;padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.b1{background:linear-gradient(135deg,#FF6B9D,#C44A8B);color:#fff}
.b1:hover{transform:translateY(-1px)}
.b2{background:#10b981;color:#fff}.b2:hover{transform:translateY(-1px)}
.b3{background:#667eea;color:#fff}.b3:hover{transform:translateY(-1px)}
.bg{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
#bp{padding:8px 12px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0;font-size:11px;color:#166534;display:none;margin-top:8px}
#bp.s{display:block}
.ca{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.em{grid-column:1/-1;text-align:center;padding:40px 20px;color:#bbb}
.em .bi{font-size:40px;margin-bottom:8px}
.cd{width:100%;aspect-ratio:3/4;border-radius:14px;overflow:hidden;position:relative;display:flex;flex-direction:column;padding:22px 14px}
.cd .tg1{position:absolute;top:12px;left:12px;background:linear-gradient(135deg,rgba(255,107,157,.4),rgba(200,80,192,.3));padding:2px 8px;border-radius:12px;font-size:9px;color:#ffb3d0}
.cw{margin-bottom:10px}
.cw .cb{display:flex;gap:4px;margin-top:4px;justify-content:center}
.cw .cb button{padding:2px 5px;font-size:9px;border:none;border-radius:4px;cursor:pointer;background:#f0f0f0;color:#666}
.cw .cb button:hover{background:linear-gradient(135deg,#FF6B9D,#C44A8B);color:#fff}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.8);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;opacity:0;pointer-events:none;z-index:999}
#toast.ts{opacity:1;transform:translateX(-50%) translateY(0)}
.br{display:flex;gap:6px;align-items:center;margin-top:8px}
.br input{width:50px;padding:4px 6px;border:1px solid #e8e8e8;border-radius:6px;font-size:11px;text-align:center}
.br label{font-size:11px;color:#888}
</style>
</head>

<div class=bg>

</div>

    case"t1":h=deco1+"<div class=tg1>"+d.tag+"</div><div style=font-size:32px;margin-bottom:4px;opacity:.15>💔</div><div style=font-weight:700;font-size:20px;line-height:1.5;margin-bottom:10px;color:rgba(255,255,255,.95)>「"+d.m+"」</div><div style=font-size:12px;line-height:1.6;opacity:.75;color:#d4cce0>"+d.s+"</div><div style=position:absolute;bottom:16px;left:18px;font-size:10px;opacity:.5;color:#b8a0fa>❤️ 情感成长</div>";break;
    case"t2":h=deco1+"<div style=position:absolute;top:12px;right:14px;font-size:20px;opacity:.25>🌸✨</div>"+"<div style=font-weight:700;font-size:18px;line-height:1.5;margin-bottom:10px;padding-left:14px;border-left:3px solid #e8a0b4;color:#8b5a6b>"+d.m+"</div>"+"<div style=font-size:12px;line-height:1.6;opacity:.85;color:#5a3d4a>"+d.s+"</div>"+"<div style=margin-top:auto;font-size:10px;opacity:.7;display:flex;justify-content:space-between;color:#a07080><div style=width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#e8a0b4,#d4819a);display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px>♥</div><span>"+d.tag+"</span></div>";break;
    case"t3":var tl=d.s.split("\n").map(function(l){return"<li>"+l.replace(/^\d+\.\s*/,"")+"</li>"}).join("");h=deco1+"<div style=position:absolute;top:14px;right:14px;background:linear-gradient(135deg,#66bb6a,#43a047);color:#fff;padding:2px 10px;border-radius:10px;font-size:9px>干货</div>"+"<div style=font-weight:700;font-size:17px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px dashed #a5d6a7;color:#2e7d32;padding-right:50px>"+d.m+"</div>"+"<ul style=list-style:none;font-size:12px;line-height:1.9;padding-left:0;color:#336b3c>"+tl+"</ul>"+"<div style=position:absolute;bottom:16px;right:16px;font-size:10px;opacity:.3>✨ 收藏慢慢看</div>";break;
    case"t4":h=deco1+"<div style=font-size:48px;opacity:.05;position:absolute;top:20px;right:20px;font-weight:700>?</div>"+"<div style=margin-top:16px;text-align:center><div style=font-weight:700;font-size:18px;line-height:1.5;margin-bottom:6px;color:#8a5a4a>"+d.m+"</div><div style=font-size:13px;opacity:.8;line-height:1.5;margin-bottom:14px;color:#5a4a4a>"+d.s+"</div><div style=display:flex;gap:12px;justify-content:center><span style=padding:5px 16px;border-radius:16px;font-size:11px;border:1px solid #f0d0d0;background:rgba(255,255,255,.7);color:#a08080>💬 评论</span><span style=padding:5px 16px;border-radius:16px;font-size:11px;border:1px solid #f0d0d0;background:rgba(255,255,255,.7);color:#a08080>❤️ 点赞</span><span style=padding:5px 16px;border-radius:16px;font-size:11px;border:1px solid #f0d0d0;background:rgba(255,255,255,.7);color:#a08080>↗️ 转发</span></div></div>";break;
    case"t5":h=deco1+"<div style=position:absolute;top:0;left:0;width:100%;height:4px;background:linear-gradient(90deg,#FF6B9D,#ffd54f)></div>"+"<div style=font-weight:700;font-size:17px;margin-bottom:6px;color:#b0daf9>"+d.m+"</div>"+"<div style=display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;margin:12px 0;text-align:center><div><div style=font-size:9px;opacity:.5;color:#7986cb>以前</div><div style=font-size:14px;font-weight:700;opacity:.6>😞 迷茫</div></div><div style=width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;background:rgba(255,255,255,.1);color:#7c4dff>→</div><div><div style=font-size:9px;opacity:.5;color:#7986cb>现在</div><div style=font-size:14px;font-weight:700>✨ 觉醒</div></div></div>"+"<div style=font-size:11px;opacity:.8;line-height:1.6;color:#d0dee5>"+d.s.replace(/\n/g,"<br>")+"</div>"+"<div style=margin-top:10px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden><div style=height:100%;width:70%;background:linear-gradient(90deg,#FF6B9D,#ffd54f)></div></div>";break;
    case"t6":h=deco1+"<div style=position:absolute;bottom:5px;right:5px;font-size:30px;opacity:.04>🧠</div>"+"<div style=margin-top:12px;text-align:center><div style=font-size:32px;margin-bottom:4px>🧠</div><div style=font-weight:700;font-size:16px;margin-bottom:10px;color:#006064>"+d.m+"</div><div style=font-size:12px;line-height:1.6;opacity:.85;color:#37474f>"+d.s+"</div></div>"+"<div style=position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:9px;opacity:.45;background:rgba(255,255,255,.5);padding:2px 10px;border-radius:8px;color:#78909c;white-space:nowrap>用知识打破羞耻 💪</div>";break;
  }
  return '<div class=cw><div class=cd style=background:'+b.c+" >"+h+'</div><div class=cb><button class=dl-btn data-id='+id+'>📥 导出</button><button class=rm-btn data-id='+id+'>🗑 删除</button></div></div>';
}
// ===== 批量生成 =====
function gen(){
  var t=gT();var bg=selBg;
  var m=document.getElementById("mt").value.trim();
  var s=document.getElementById("st").value.trim();
  var tag=document.getElementById("tag").value.trim()||"情感成长";
  var cnt=document.getElementById("cnt");
  var n=cnt?parseInt(cnt.value)||3:3;
  if(!m)m=pA(V[t].m);
  if(!s)s=pA(V[t].s);
  var a=document.getElementById("ca");a.innerHTML="";
  document.getElementById("cc").textContent="";
  for(var i=0;i<n;i++){
    cid++;var id="c"+cid;
    var dd={m:m,s:s,tag:tag};
    if(n>1){dd.m=pA(V[t].m);dd.s=pA(V[t].s);}
    a.insertAdjacentHTML("beforeend",cd(t,bg,dd,id));
  }
  document.getElementById("cc").textContent="（共"+n+"张）";
  document.getElementById("bp").classList.remove("s");
}
function batchGen(){
  var t=gT();var bg=selBg;
  var tag=document.getElementById("tag").value.trim()||"情感成长";
  var bcn=document.getElementById("bcnt");
  var n=bcn?parseInt(bcn.value)||10:10;
  var a=document.getElementById("ca");a.innerHTML="";
  document.getElementById("cc").textContent="";
  var p=document.getElementById("bp");p.classList.add("s");
  p.textContent="⏳ 正在批量生成 "+n+" 张...";
  setTimeout(function(){
    for(var i=0;i<n;i++){
      cid++;var id="c"+cid;
      var m=pA(V[t].m);var s=pA(V[t].s);
      var dd={m:m,s:s,tag:tag};
      a.insertAdjacentHTML("beforeend",cd(t,bg,dd,id));
    }
    document.getElementById("cc").textContent="（共"+n+"张）";
    p.textContent="✅ 批量生成 "+n+" 张完成！点击「全部导出」下载";
    setTimeout(function(){p.classList.remove("s")},4000);
  },100);
}
// ===== 导出 SVG =====
function dl(id){
  var el=document.getElementById(id);
  if(!el)return;
  var styles="";var ss=document.styleSheets;
  for(var i=0;i<ss.length;i++){try{var r=ss[i].cssRules;for(var j=0;j<r.length;j++){styles+=r[j].cssText}}catch(e){}}
  var s='<svg xmlns="http://www.w3.org/2000/svg" width="'+el.offsetWidth+'" height="'+el.offsetHeight+'"><foreignObject width="100%"height="100%"><div xmlns="http://www.w3.org/1999/xhtml"><style>'+styles+"</style>"+el.outerHTML+"</div></foreignObject></svg>";
  var b=new Blob([s],{type:"image/svg+xml;charset=utf-8"});
  var u=URL.createObjectURL(b);
  var a=document.createElement("a");a.download="情感卡片-"+id+".svg";a.href=u;a.click();
  URL.revokeObjectURL(u);
  toast("✅ 已导出："+id);
}
function toast(msg){
  var el=document.getElementById("toast");
  if(!el){el=document.createElement("div");el.id="toast";document.body.appendChild(el)}
  el.textContent=msg;el.className="ts";
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.className=""},2500);
}
// ===== 导出全部 =====
document.getElementById("expBtn").addEventListener("click",function(){
  var b=document.querySelectorAll(".dl-btn");
  if(!b.length){alert("还没有卡片，先点「生成」吧！");return}
  toast("⏳ 导出 "+b.length+" 张...");
  for(var i=0;i<b.length;i++){
    (function(idx){setTimeout(function(){b[idx].click()},idx*300)})(i);
  }
  setTimeout(function(){toast("✅ "+b.length+" 张导出完成！文件在下载文件夹")},b.length*300+500);
});
// ===== 删除 =====
function rm(id){
  var c=document.getElementById(id);if(!c)return;
  var w=c.closest(".cw");if(w){w.remove()}
  var r=document.querySelectorAll(".cw").length;
  document.getElementById("cc").textContent=r?"（共"+r+"张）":"";
  if(!r)document.getElementById("ca").innerHTML='<div class=em><div class=bi>🎴</div><p>选好内容点「生成」</p></div>';
}
// ===== 事件委托 =====
document.getElementById("ca").addEventListener("click",function(e){
  var b=e.target.closest("button");if(!b)return;
  var id=b.getAttribute("data-id");
  if(b.classList.contains("dl-btn"))dl(id);
  if(b.classList.contains("rm-btn"))rm(id);
});
// ===== 初始化 =====
renderContentList();
gen();

</script>
</body>
</html>
