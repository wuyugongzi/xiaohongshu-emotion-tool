+;var id="c"+cid,dd={m:m,s:s,tag:"情感"}if(i>0){dd.m=pA(V[t].m);var rr=V[t].s;if(Array.isArray(rr[0])){var r2=pA(rr);dd.s=r2[Math.floor(Math.random()*r2.length)]}else dd.s=pA(rr)}a.insertAdjacentHTML("beforeend",makeCard(t,bg,dd,id))}}function dl(id){var el=document.getElementById(id);if(!el)return;var cd=el.querySelector(".cd")||el;var styles="";var ss=document.styleSheets;for(var i=0;i<ss.length;i++){try{var r=ss[i].cssRules;for(var j=0;j<r.length;j++){styles+=r[j].cssText}}catch(e){}}var s="<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"900\" height=\"1200\"><foreignObject width=\"100%\" height=\"100%\"><div xmlns=\"http://www.w3.org/1999/xhtml\"><style>"+styles+"</style>"+cd.outerHTML+"</div></foreignObject></svg>";var w=window.open("","_blank");w.document.write("<html><body style=\"margin:0\"><img src=\"data:image/svg+xml;charset=utf-8,"+encodeURIComponent(s)+"\" style=\"max-width:100%\"><p>右键另存为</p></body></html>");w.document.close();}function dlPNG(id){var el=document.getElementById(id);if(!el)return;var cd=el.querySelector(".cd");if(!cd)return;var w=cd.offsetWidth,h=cd.offsetHeight;var styles="";var ss=document.styleSheets;for(var i=0;i<ss.length;i++){try{var r=ss[i].cssRules;for(var j=0;j<r.length;j++){styles+=r[j].cssText}}catch(e){}}var svg="<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"+w+"\" height=\"+h+"\"><foreignObject width=\"100%\" height=\"100%\"><div xmlns=\"http://www.w3.org/1999/xhtml\"><style>"+styles+"</style>"+cd.outerHTML+"</div></foreignObject></svg>";var canvas=document.createElement("canvas");canvas.width=w*2;canvas.height=h*2;var ctx=canvas.getContext("2d");ctx.scale(2,2);var img=new Image();img.onload=function(){ctx.drawImage(img,0,0);var url=canvas.toDataURL("image/png");var w2=window.open("","_blank");w2.document.write("<html><body style=\"margin:0\"><img src=\""+url+"\" style=\"max-width:100%\"><p>✅ 右键另存为即可保存到桌面</p></body></html>");w2.document.close();};img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg);}document.getElementById("ca").addEventListener("click",function(e){var b=e.target.closest("button");if(!b)return;var id=b.getAttribute("data-id");if(b.classList.contains("dl-btn"))dl(id);if(b.classList.contains("png-btn"))dlPNG(id)});gen();</script></body></html>
