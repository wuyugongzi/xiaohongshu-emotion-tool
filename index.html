  document.getElementById("cc").textContent="";
  for(var i=0;i<n;i++){
    cid++;var id="c"+cid,dd={m:m,s:s,tag:tag};
    if(n>1){
      dd.m=pA(V[t].m);
      var rs=V[t].s;
      if(Array.isArray(rs)){
        if(Array.isArray(rs[0])){var r=pA(rs);dd.s=r[Math.floor(Math.random()*r.length)]}
        else dd.s=pA(rs);
      } else dd.s=rs||"";
    }
    a.insertAdjacentHTML("beforeend",makeCard(t,bg,dd,id));
  }
  document.getElementById("cc").textContent="（共"+n+"张）";
  document.getElementById("bp").classList.remove("s");
}

function batchGen(){
  var t=selTpl,bg=selBg;
  var tag=document.getElementById("tag").value.trim()||"情感治愈";
  var bcn=document.getElementById("bcnt");
  var n=bcn?parseInt(bcn.value)||10:10;
  var a=document.getElementById("ca");a.innerHTML="";
  document.getElementById("cc").textContent="";
  var p=document.getElementById("bp");p.classList.add("s");
  p.textContent="⏳ 正在批量生成 "+n+" 张...";
  setTimeout(function(){
    for(var i=0;i<n;i++){
      cid++;var id="c"+cid;
      var m=pA(V[t].m),s="";
      var rs=V[t].s;
      if(Array.isArray(rs)){
        if(Array.isArray(rs[0])){var r=pA(rs);s=r[Math.floor(Math.random()*r.length)]}
        else s=pA(rs);
      } else s=rs||"";
      var dd={m:m,s:s,tag:tag};
      a.insertAdjacentHTML("beforeend",makeCard(t,bg,dd,id));
    }
    document.getElementById("cc").textContent="（共"+n+"张）";
    p.textContent="✅ 批量生成 "+n+" 张完成！点击「全部导出」下载";
    setTimeout(function(){p.classList.remove("s")},4000);
  },100);
}


function dlPNG(id){
  var el=document.getElementById(id);if(!el)return;
  var cd=el.querySelector('.cd');if(!cd)return;
  var w=cd.offsetWidth,h=cd.offsetHeight;
  var styles='';var ss=document.styleSheets;
  for(var i=0;i<ss.length;i++){try{var r=ss[i].cssRules;for(var j=0;j<r.length;j++){styles+=r[j].cssText}}catch(e){}}
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml"><style>'+styles+'</style>'+cd.outerHTML+'</div></foreignObject></svg>';
  var url=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml;charset=utf-8'}));
  var img=new Image();
  img.onload=function(){
    var c=document.createElement('canvas');c.width=w*2;c.height=h*2;
    var ctx=c.getContext('2d');ctx.scale(2,2);ctx.drawImage(img,0,0);
    URL.revokeObjectURL(url);
    c.toBlob(function(b){var u=URL.createObjectURL(b);var a=document.createElement('a');a.download='情感卡片-'+id+'.png';a.href=u;a.click();URL.revokeObjectURL(u);});
  };
  img.src=url;
  toast('📥 导出PNG: '+id);
}

function dl(id){
  var el=document.getElementById(id);
  if(!el)return;
  var styles="";var ss=document.styleSheets;
  for(var i=0;i<ss.length;i++){try{var r=ss[i].cssRules;for(var j=0;j<r.length;j++){styles+=r[j].cssText}}catch(e){}}
  var s='<svg xmlns="http://www.w3.org/2000/svg" width="'+el.offsetWidth+'" height="'+el.offsetHeight+'"><foreignObject width="100%"height="100%"><div xmlns="http://www.w3.org/1999/xhtml"><style>'+styles+"</style>"+el.outerHTML+"</div></foreignObject></svg>";
  var b=new Blob([s],{type:"image/svg+xml;charset=utf-8"});
  var u=URL.createObjectURL(b);
  var a=document.createElement("a");a.download="情感爆款-"+id+".svg";a.href=u;a.click();
  URL.revokeObjectURL(u);
  toast("✅ 已导出："+id);
}

function toast(msg){
  var el=document.getElementById("toast");
  if(!el){el=document.createElement("div");el.id="toast";document.body.appendChild(el)}
  el.textContent=msg;el.className="ts";
  clearTimeout(el._t);el._t=setTimeout(function(){el.className=""},2500);
}

document.getElementById("expBtn").addEventListener("click",function(){
  var b=document.querySelectorAll(".dl-btn");
  if(!b.length){alert("还没有卡片，先点「生成」吧！");return}
  toast("⏳ 导出 "+b.length+" 张...");
  for(var i=0;i<b.length;i++){(function(idx){setTimeout(function(){b[idx].click()},idx*300)})(i)}
  setTimeout(function(){toast("✅ "+b.length+" 张导出完成！文件在下载文件夹")},b.length*300+500);
});

function rm(id){
  var c=document.getElementById(id);if(!c)return;
  var w=c.closest(".cw");if(w){w.remove()}
  var r=document.querySelectorAll(".cw").length;
  document.getElementById("cc").textContent=r?"（共"+r+"张）":"";
  if(!r)document.getElementById("ca").innerHTML='<div class=em><div class=bi>🎴</div><p>选好内容点「生成」开始创作</p></div>';
}


function batchPng(){var b=document.querySelectorAll(".png-btn");if(!b.length){alert("还没有卡片");return}toast("⏳ 导出 "+b.length+" 张PNG...");for(var i=0;i<b.length;i++){(function(idx){setTimeout(function(){b[idx].click()},idx*600)})(i)}setTimeout(function(){toast("✅ "+b.length+" 张PNG导出完成！")},b.length*600+1000)}
function copyAllText(){
  var titles=[];
  document.querySelectorAll(".cd").forEach(function(cd){
    var mt=cd.querySelector("[style*='font-weight:700']");
    if(mt) titles.push(mt.textContent.trim());
  });
  if(titles.length===0){alert("没有卡片文案可复制");return}
  var txt=titles.join("\n---\n");
  var ta=document.createElement("textarea");ta.value=txt;
  document.body.appendChild(ta);ta.select();document.execCommand("copy");
  document.body.removeChild(ta);
  toast("📋 已复制 "+titles.length+" 条文案到剪贴板");
}

document.getElementById("pngBatch")?.addEventListener("click",batchPng);
document.getElementById("ca").addEventListener("click",function(e){
  var b=e.target.closest("button");if(!b)return;
  var id=b.getAttribute("data-id");
  if(b.classList.contains("dl-btn"))dl(id);
  if(b.classList.contains("rm-btn"))rm(id);if(b.classList.contains("png-btn"))dlPNG(id);
  if(b.classList.contains("cp-btn")){
    var el=document.getElementById(id);
    if(el){var t=el.textContent.trim();var ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);toast("📋 已复制文案")}
  }
});
