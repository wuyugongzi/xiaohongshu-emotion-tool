<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小红书情感爆款批量生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;padding:12px}
.h{max-width:1200px;margin:0 auto 16px;padding:20px 24px;background:linear-gradient(135deg,#FF6B9D,#C44A8B);border-radius:14px;color:#fff}
.h h1{font-size:22px;font-weight:700}
.l{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:240px 1fr;gap:16px}
.p{background:#fff;border-radius:12px;padding:14px}
.b{display:inline-block;padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#FF6B9D,#C44A8B);color:#fff}
.ca{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.cd{width:100%;aspect-ratio:3/4;border-radius:14px;overflow:hidden;position:relative;display:flex;flex-direction:column;padding:22px 14px}
.cw{margin-bottom:10px}
.em{grid-column:1/-1;text-align:center;padding:40px;color:#bbb}
</style>
</head>
<body>
<div class=h><h1>✨ 小红书情感爆款批量生成器</h1></div>
<div class=l>
<div class=p>
<button class="b" onclick="genCards()">🎯 生成</button>
</div>
<div class=p>
<div class=ca id=cards><div class=em><p>点「生成」开始</p></div></div>
</div>
</div>
<script>
var V={
t1:{n:"妈妈式治愈",m:["做大人累了，回来做个孩子吧"],s:["你不需要一直都那么坚强，偶尔软弱也是可以的。"]},
t2:{n:"以前vs现在",m:["以前患得患失，现在顺其自然"],s:["把期待放在自己身上是安全感最好的来源"]},
t3:{n:"反差感语录",m:["嘴上说无所谓，心里其实在意的要死"],s:["白天嘻嘻哈哈好像什么都无所谓，晚上一个人躲在被子里偷偷emo"]}
};
var BG={b1:"linear-gradient(160deg,#1a1a3e,#2d2d6b,#3a3a6e)",b2:"linear-gradient(135deg,#fce4ec,#f8e8f0,#fff0f5)"};
var cid=0;
function gA(a){return a[Math.floor(Math.random()*a.length)]}
function genCards(){
  var a=document.getElementById("cards");a.innerHTML="";
  var keys=Object.keys(V);
  for(var i=0;i<3;i++){
    var t=gA(keys);
    var m=gA(V[t].m);
    var s=gA(V[t].s);
    cid++;
    var html="<div class=cw id='card"+cid+"'><div class=cd style='background:'+BG[gA(Object.keys(BG))]+'><div style='font-weight:700;font-size:17px;line-height:1.6;color:rgba(255,255,255,.95);margin-bottom:10px'>"+m+"</div><div style='font-size:11px;line-height:1.7;color:rgba(255,255,255,.7)'>"+s+"</div></div><div style='display:flex;gap:4px;justify-content:center;margin-top:4px'><button onclick='dlPNG(\"card"+cid+"\")'>🖼 PNG导出</button><button onclick='showSVG(\"card"+cid+"\")'>📥 SVG</button></div></div>";
    a.insertAdjacentHTML("beforeend",html);
  }
}
function showSVG(id){
  var el=document.getElementById(id);
  var cd=el.querySelector(".cd");
  var ss="";var st=document.styleSheets;
  for(var i=0;i<st.length;i++){try{var r=st[i].cssRules;for(var j=0;j<r.length;j++){ss+=r[j].cssText}}catch(e){}}
  var svg="<svg xmlns='http://www.w3.org/2000/svg' width='900' height='1200'><foreignObject width='100%' height='100%'><div xmlns='http://www.w3.org/1999/xhtml'><style>"+ss+"</style>"+cd.outerHTML+"</div></foreignObject></svg>";
  var w=window.open("","_blank");
  w.document.write("<html><body style='margin:0'><img src='data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg)+"' style='max-width:100%'><p>右键另存为</p></body></html>");
  w.document.close();
}
function dlPNG(id){
  var el=document.getElementById(id);
  var cd=el.querySelector(".cd");
  var w=cd.offsetWidth,h=cd.offsetHeight;
  var ss="";var st=document.styleSheets;
  for(var i=0;i<st.length;i++){try{var r=st[i].cssRules;for(var j=0;j<r.length;j++){ss+=r[j].cssText}}catch(e){}}
  var svg="<svg xmlns='http://www.w3.org/2000/svg' width='"+w+"' height='"+h+"'><foreignObject width='100%' height='100%'><div xmlns='http://www.w3.org/1999/xhtml'><style>"+ss+"</style>"+cd.outerHTML+"</div></foreignObject></svg>";
  var c=document.createElement("canvas");c.width=w*2;c.height=h*2;
  var ctx=c.getContext("2d");ctx.scale(2,2);
  var img=new Image();
  img.onload=function(){ctx.drawImage(img,0,0);var u=c.toDataURL("image/png");var w2=window.open("","_blank");w2.document.write("<html><body style='margin:0'><img src='"+u+"' style='max-width:100%'><p>✅ 右键另存为</p></body></html>");w2.document.close();};
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg);
}
genCards();
</script>
</body>
</html>
