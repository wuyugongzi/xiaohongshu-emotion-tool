<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小红书情感爆款批量生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;padding:12px}
.h{max-width:1200px;margin:0 auto 16px;padding:20px;background:linear-gradient(135deg,#FF6B9D,#C44A8B);border-radius:14px;color:#fff}
.h h1{font-size:22px;font-weight:700}
.l{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:240px 1fr;gap:16px}
.p{background:#fff;border-radius:12px;padding:14px}
.f{margin-bottom:10px}
.f label{display:block;font-size:11px;font-weight:500;margin-bottom:3px;color:#888}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:10px}
.to{border:2px solid #eee;border-radius:8px;padding:6px 2px;text-align:center;cursor:pointer;font-size:10px;color:#999;background:#fafafa}
.to.s,.to:hover{border-color:#FF6B9D;background:#fff0f5;color:#C44A8B}
.to .i{font-size:12px;display:block}
.bgg{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;max-height:150px;overflow-y:auto}
.bgo{border:2px solid #eee;border-radius:6px;padding:4px;text-align:center;cursor:pointer;font-size:9px;color:#999;height:40px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.bgo.s,.bgo:hover{border-color:#FF6B9D}
.b{display:inline-block;padding:6px 12px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.b1{background:linear-gradient(135deg,#FF6B9D,#C44A8B);color:#fff}
.b2{background:#10b981;color:#fff}
.b3{background:#667eea;color:#fff}
.br{display:flex;gap:6px;align-items:center;margin-top:8px}
.br input{width:50px;padding:4px 6px;border:1px solid #e8e8e8;border-radius:6px;font-size:11px;text-align:center}
.ca{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.cd{width:100%;aspect-ratio:3/4;border-radius:14px;overflow:hidden;position:relative;display:flex;flex-direction:column;padding:22px 14px}
.cw{margin-bottom:10px}
.cw .cb{display:flex;gap:4px;margin-top:4px;justify-content:center}
.cw .cb button{padding:2px 5px;font-size:9px;border:none;border-radius:4px;cursor:pointer;background:#f0f0f0;color:#666}
.em{grid-column:1/-1;text-align:center;padding:40px;color:#bbb}
.cl{max-height:250px;overflow-y:auto}
.ci{padding:5px 8px;border:1px solid #f0f0f0;border-radius:6px;margin-bottom:3px;cursor:pointer}
.ci:hover{background:#fff0f5;border-color:#FF6B9D}
</style>
</head>
<body>
<div class=h><h1>小红书情感爆款批量生成器</h1></div>
<div class=l>
<div class=p>
<div class=f><label>模板</label><div class=tg id=tplList></div></div>
<div class=f><label>背景</label><div class=bgg id=bgList></div></div>
<div class=f><label>素材库</label><div class=cl id=contentList></div></div>
<div class=br>
<button class="b b1" id=btnGen>生成</button>
<button class="b b2" id=btnBatch>批量</button>
<input id=bcnt type=number value=10 min=1 max=200>
<label>张</label>
</div>
</div>
<div class=p>
<div class=ca id=cards></div>
</div>
</div>
<script>
"use strict";
var cid=0;
var selTpl="t1",selBg="bg1";

var V={t1:{n:"妈妈式治愈·温暖陪伴",m:["做大人累了，回来做个孩子吧","世界给的子弹够多了","你不需要完美才值得被爱","你不用那么坚强偶尔也可以示弱","你值得被温柔以待","慢慢来我一直在这里陪着你","你可以哭但哭完要继续走","别怕天塌下来有妈妈给你顶着","你本身就是一份礼物","爱自己是一生最浪漫的开始"],s:["做大人太累了，每天要面对那么多压力和委屈。在这里你可以卸下所有伪装，做回那个单纯的孩子。","你不需要一直都那么坚强，偶尔软弱也是可以的。你的委屈我都懂，你的难过我都看在眼里。"]},t2:{n:"以前vs现在·人间清醒",m:["以前我总怕失去他现在我更怕弄丢自己","以前患得患失现在顺其自然","以前卑微讨好现在宁缺毋滥","以前围着他转现在围着自己转","以前委屈求全现在活得通透","以前以为爱是付出现在明白爱是相互","以前把恋爱当全部现在把自己当全部"],s:["以前患得患失，现在顺其自然。把期待放在自己身上是安全感最好的来源。","以前总是我在付出，现在双向奔赴才有意义。好的爱情是相互成就不是单方面消耗。"]},t3:{n:"人间清醒·金句",m:["不删除不拉黑不联系就是答案","他回消息的速度就是你在ta心里的位置","别在深夜做任何决定","放下不是放弃是新的开始","爱情不是生活的全部你才是","成年人感情不主动就是拒绝","学会及时止损是最高级的自律"],s:["他如果真的在乎你，会主动告诉你一切。别在不值得的人身上浪费情绪。","那些让你哭的事总有一天你会笑着说出来。时间不语却回答了所有问题。"]},t4:{n:"女性成长·觉醒",m:["谢谢你让我变成更好的自己","离开错的人才能遇到对的自己","单身是最好的增值期","先谋生再谋爱顺序别搞反","经济独立是女生最大的底气","不要为了任何人放弃你的梦想","取悦自己才是头等大事"],s:["真正的成长是从不再依赖任何人开始的。经济独立和心理独立缺一不可。","不要因为一段失败的感情否定自己。不是你不够好，是他配不上你的好。"]},t5:{n:"深夜emo·情绪共鸣",m:["原来真正的心寒不是生气而是沉默","我以为只要够努力就能留住你","最后还是输给了新鲜感","有些人注定只能陪你走一段路","那段时间我真的差点熬不过来","原来真心真的会被辜负","最怕突然听懂一首歌"],s:["你以为是突然走散的，其实人家早就想好了退路，只是你还在原地等。","那些深夜流的泪，总有一天会变成你嘴角的笑。时间从来不语却回答了所有问题。"]},t6:{n:"女生必看·干货",m:["判断他是不是对的人的5个标准","恋爱中不能妥协的3个底线","女生一定要懂的恋爱真相","让感情越来越好的6个习惯","分手后快速走出来的4个方法","高情商女生都做对了什么","比男朋友更重要的7样东西"],s:["看他低谷时对你的态度，看他是否把你规划进未来，看他是否尊重你的选择。细节见人品日久见人心。","沟通是感情的润滑剂。学会表达需求而不是发泄情绪。保持独立比黏在一起更重要。"]},t7:{n:"互动投票·引流",m:["分手后还能做朋友吗","男朋友这个行为你能忍吗","你觉得谈恋爱需要天天见面吗","恋爱中最加分的行为是什么","你会介意TA的过去吗","门当户对重要吗","情侣该不该看对方手机"],s:["快来评论区告诉我～","留下你的答案👇","一起聊聊这个话题～姐妹们怎么看？"]},t8:{n:"故事·感悟分享",m:["分手那天我一个人去了我们第一次约会的地方","在一起三年他用10分钟说完了分手","收到他结婚消息的时候我正在加班","删掉他的那一刻我前所未有的轻松","妈妈问我为什么最近都不谈恋爱的了","他说的最后一句话我听了半年才懂"],s:["那个地方还是和以前一样美，只是身边的人不在了。回去的路上我哭了，但哭完之后突然觉得轻松了。原来放下就是从接受失去开始的。","他说我们不合适，可是三年为什么不早点说。后来我想通了，不是不合适，是不够爱。"]},t9:{n:"反差感语录",m:["嘴上说无所谓心里其实在意的要死","别看我整天笑嘻嘻深夜也会偷偷哭","表面我没事实际我快碎了","装大人装久了差点忘了自己才二十出头","白天人间值得晚上毁灭吧","朋友圈岁月静好内心兵荒马乱"],s:["白天嘻嘻哈哈好像什么都无所谓，晚上一个人躲在被子里偷偷emo。这就是成年人的两面性。","在朋友面前我永远是最淡定的那个。但只有我自己知道，每次深夜我都在想，到底什么时候才能做回那个可以撒娇的小孩。"]},t10:{n:"嘴替金句",m:["我脾气很好我妈你再说一遍","有些话说着说着就沉默了","和亲近的人吵架赢了却感觉输了","懂事的孩子背后都没人撑腰","每次想发脾气都在心里默念算了","成年人最大的默契你不问我不说"],s:["妈妈说我脾气大的时候，我本来想反驳的，但想了想她说的对。果然最了解你的人还是家人。","和越亲近的人说话越容易失控，因为知道他们不会离开，所以把最差的一面留给了最亲的人。"]}};

var BG={bg1:{n:"星夜紫",c:"linear-gradient(160deg,#1a1a3e,#2d2d6b,#3a3a6e)"},bg2:{n:"深海蓝",c:"linear-gradient(160deg,#1a1a3e,#2835a0,#3a4ab0)"},bg3:{n:"温柔粉",c:"linear-gradient(135deg,#fce4ec,#f8e8f0,#fff0f5)"},bg4:{n:"清新绿",c:"linear-gradient(160deg,#e8f5e9,#f1f8e9,#fff8e1)"},bg5:{n:"暖阳橙",c:"linear-gradient(135deg,#fff8e1,#fce4ec,#f3e5f5)"},bg6:{n:"梦幻彩",c:"linear-gradient(135deg,#e0f7fa,#f3e5f5,#fff9c4)"},bg7:{n:"极简白",c:"linear-gradient(135deg,#fff,#f8f9fa,#e9ecef)"},bg8:{n:"暗夜金",c:"linear-gradient(160deg,#2a2a3e,#26304e,#633493)"},bg9:{n:"樱花粉",c:"linear-gradient(135deg,#fce4ec,#fff0f5,#f3e8ff)"},bg10:{n:"薄荷绿",c:"linear-gradient(160deg,#e0f2f1,#e8f5e9,#f1f8e9)"},bg11:{n:"薰衣草",c:"linear-gradient(135deg,#f3e5f5,#e8eaf6,#ede7f6)"},bg12:{n:"落日红",c:"linear-gradient(135deg,#fbe9e7,#ffccbc,#ffe0b2)"}};

function gA(a){return a[Math.floor(Math.random()*a.length)]}

function init(){
  var tplHtml="";
  var keys=Object.keys(V);
  for(var i=0;i<keys.length;i++){
    var k=keys[i];
    tplHtml+="<div class='to"+(k===selTpl?" s":"")+"' data-t='"+k+"'><span class=i>"+["👩","⚖️","💎","🌱","💔","📖","💬","📸","🎭","🎤"][i]+"</span>"+V[k].n+"</div>";
  }
  document.getElementById("tplList").innerHTML=tplHtml;

  var bgHtml="";
  var bgKeys=Object.keys(BG);
  for(var i=0;i<bgKeys.length;i++){
    var k=bgKeys[i];
    bgHtml+="<div class='bgo"+(k===selBg?" s":"")+"' data-bg='"+k+"'><div class=bgp style='background:"+BG[k].c+"'></div>"+BG[k].n+"</div>";
  }
  document.getElementById("bgList").innerHTML=bgHtml;
  renderContent();
  gen();
}

function renderContent(){
  var ct=V[selTpl];
  var html="";
  for(var i=0;i<ct.m.length;i++){
    html+="<div class=ci data-idx='"+i+"'><div style='font-size:12px;font-weight:500'>"+ct.m[i]+"</div><div style='font-size:10px;color:#999'>"+(ct.s[i]||"").substring(0,25)+"</div></div>";
  }
  document.getElementById("contentList").innerHTML=html;
}

function gen(){
  var t=selTpl,bg=selBg,b=BG[bg];
  var m=gA(V[t].m),s=gA(V[t].s);
  var isDark=bg==="bg1"||bg==="bg2"||bg==="bg8"||bg==="bg11"||bg==="bg12";
  var tc=isDark?"color:rgba(255,255,255,.95)":"color:#333";
  var sc=isDark?"color:rgba(255,255,255,.7)":"color:#555";
  var a=document.getElementById("cards");a.innerHTML="";
  cid++;
  var html="<div class=cw id='card"+cid+"'><div class=cd style='background:"+b.c+"'><div style='font-weight:700;font-size:17px;line-height:1.6;"+tc+";margin-bottom:10px'>"+m+"</div><div style='font-size:11px;line-height:1.7;"+sc+"'>"+s+"</div></div><div class=cb><button class=png-btn data-id='card"+cid+"'>PNG</button><button class=svg-btn data-id='card"+cid+"'>SVG</button><button class=del-btn data-id='card"+cid+"'>删除</button></div></div>";
  a.insertAdjacentHTML("beforeend",html);
}

function batchGen(){
  var t=selTpl,bg=selBg,b=BG[bg];
  var cnt=parseInt(document.getElementById("bcnt").value)||10;
  var a=document.getElementById("cards");a.innerHTML="";
  for(var i=0;i<cnt;i++){
    var m=gA(V[t].m),s=gA(V[t].s);
    var isDark=bg==="bg1"||bg==="bg2"||bg==="bg8"||bg==="bg11"||bg==="bg12";
    var tc=isDark?"color:rgba(255,255,255,.95)":"color:#333";
    var sc=isDark?"color:rgba(255,255,255,.7)":"color:#555";
    cid++;
    var html="<div class=cw id='card"+cid+"'><div class=cd style='background:"+b.c+"'><div style='font-weight:700;font-size:17px;line-height:1.6;"+tc+";margin-bottom:10px'>"+m+"</div><div style='font-size:11px;line-height:1.7;"+sc+"'>"+s+"</div></div><div class=cb><button class=png-btn data-id='card"+cid+"'>PNG</button><button class=svg-btn data-id='card"+cid+"'>SVG</button><button class=del-btn data-id='card"+cid+"'>删除</button></div></div>";
    a.insertAdjacentHTML("beforeend",html);
  }
}

document.getElementById("tplList").addEventListener("click",function(e){
  var el=e.target.closest(".to");
  if(!el)return;
  document.querySelectorAll(".to").forEach(function(x){x.classList.remove("s")});
  el.classList.add("s");
  selTpl=el.getAttribute("data-t");
  renderContent();
  gen();
});

document.getElementById("bgList").addEventListener("click",function(e){
  var el=e.target.closest(".bgo");
  if(!el)return;
  document.querySelectorAll(".bgo").forEach(function(x){x.classList.remove("s")});
  el.classList.add("s");
  selBg=el.getAttribute("data-bg");
  gen();
});

document.getElementById("contentList").addEventListener("click",function(e){
  var el=e.target.closest(".ci");
  if(!el)return;
  var idx=parseInt(el.getAttribute("data-idx"));
  var ct=V[selTpl];
  // Use the clicked content - just regenerate with it
  gen();
});

document.getElementById("btnGen").addEventListener("click",gen);

document.getElementById("btnBatch").addEventListener("click",batchGen);

document.getElementById("cards").addEventListener("click",function(e){
  var btn=e.target.closest("button");
  if(!btn)return;
  var id=btn.getAttribute("data-id");
  if(btn.classList.contains("del-btn")){
    var el=document.getElementById(id);
    if(el)el.remove();
    return;
  }
  var el=document.getElementById(id);
  if(!el)return;
  var cd=el.querySelector(".cd");
  if(!cd)return;
  var w=cd.offsetWidth,h=cd.offsetHeight;
  var ss="";
  var st=document.styleSheets;
  for(var i=0;i<st.length;i++){try{var r=st[i].cssRules;for(var j=0;j<r.length;j++){ss+=r[j].cssText}}catch(ex){}}
  var svg="<svg xmlns='http://www.w3.org/2000/svg' width='"+w+"' height='"+h+"'><foreignObject width='100%' height='100%'><div xmlns='http://www.w3.org/1999/xhtml'><style>"+ss+"</style>"+cd.outerHTML+"</div></foreignObject></svg>";

  if(btn.classList.contains("svg-btn")){
    var wi=window.open("","_blank");
    wi.document.write("<html><body style='margin:0'><img src='data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg)+"' style='max-width:100%'><p>右键另存为</p></body></html>");
    wi.document.close();
  }
  if(btn.classList.contains("png-btn")){
    var c=document.createElement("canvas");c.width=w*2;c.height=h*2;
    var ctx=c.getContext("2d");ctx.scale(2,2);
    var img=new Image();
    img.onload=function(){ctx.drawImage(img,0,0);var u=c.toDataURL("image/png");var w2=window.open("","_blank");w2.document.write("<html><body style='margin:0'><img src='"+u+"' style='max-width:100%'><p>右键另存为</p></body></html>");w2.document.close();};
    img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg);
  }
});

init();
</script>
</body>
</html>
